const SUPA_URL = "https://xmkvlwkmyrdscdaaoxaf.supabase.co";
const SUPA_KEY = "sb_publishable_ul_ROVJkCYuxl1gMfkhzWQ_eA9yCfDY";

const supa = {
  from: (table) => ({
    select: async (cols = "*") => {
      const res = await fetch(`${SUPA_URL}/rest/v1/${table}?select=${cols}&order=created_at.desc`, {
        headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
      });
      return res.json();
    },
    insert: async (data) => {
      const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
        method: "POST",
        headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify(data)
      });
      return res.json();
    },
    update: async (data, match) => {
      const params = Object.entries(match).map(([k,v]) => `${k}=eq.${v}`).join("&");
      const res = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, {
        method: "PATCH",
        headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify(data)
      });
      return res.json();
    },
    delete: async (match) => {
      const params = Object.entries(match).map(([k,v]) => `${k}=eq.${v}`).join("&");
      const res = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, {
        method: "DELETE",
        headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
      });
      return res.ok;
    }
  }),
  uploadFoto: async (file, fileName) => {
    const res = await fetch(`${SUPA_URL}/storage/v1/object/propiedades/${fileName}`, {
      method: "POST",
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, "Content-Type": file.type },
      body: file
    });
    if (res.ok) {
      return `${SUPA_URL}/storage/v1/object/public/propiedades/${fileName}`;
    }
    return null;
  }
};

    color: var(--text3);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .sidebar-nav {
    flex: 1;
    padding: 16px 0;
    overflow-y: auto;
  }
  .nav-section-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 12px 24px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 24px;
    cursor: pointer;
    color: var(--text2);
    font-size: 12.5px;
    font-weight: 400;
    transition: all 0.15s;
    position: relative;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active {
    color: var(--gold2);
    background: var(--gold-dim);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 2px;
    background: var(--gold);
    border-radius: 0 2px 2px 0;
  }
  .nav-icon { width: 15px; text-align: center; font-size: 14px; }
  .nav-badge {
    margin-left: auto;
    background: var(--gold-dim);
    color: var(--gold);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 20px;
    font-weight: 500;
  }
  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }
  .agent-card {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .agent-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #8b6832);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    flex-shrink: 0;
  }
  .agent-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .agent-role { font-size: 10px; color: var(--text3); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .topbar {
    height: 56px;
    background: var(--ink2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    flex-shrink: 0;
  }
  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    flex: 1;
  }
  .topbar-title span { color: var(--gold); }
  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--ink3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    width: 220px;
    color: var(--text2);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  .search-bar:focus-within { border-color: var(--gold); }
  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    width: 100%;
  }
  .search-bar input::placeholder { color: var(--text3); }
  .topbar-btn {
    width: 34px; height: 34px;
    border-radius: 6px;
    background: var(--ink3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text2);
    font-size: 15px;
    transition: all 0.15s;
  }
  .topbar-btn:hover { border-color: var(--gold); color: var(--gold); }
  .notif-dot {
    position: relative;
  }
  .notif-dot::after {
    content: '';
    position: absolute;
    top: 6px; right: 6px;
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    border: 1px solid var(--ink2);
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  /* ── DASHBOARD ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--ink2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: var(--border2); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-color, var(--gold)), transparent);
    opacity: 0.6;
  }
  .kpi-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .kpi-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }
  .kpi-sub {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .kpi-trend { font-weight: 500; }
  .kpi-trend.up { color: var(--green); }
  .kpi-trend.down { color: var(--red); }
  .kpi-icon {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 20px;
    opacity: 0.15;
  }

  .dash-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
    margin-bottom: 24px;
  }

  .panel {
    background: var(--ink2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
  }
  .panel-action {
    font-size: 11px;
    color: var(--gold);
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .panel-action:hover { color: var(--gold2); }
  .panel-body { padding: 16px 20px; }

  /* Visitas hoy */
  .visit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .visit-item:last-child { border-bottom: none; }
  .visit-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--gold);
    min-width: 52px;
    line-height: 1;
  }
  .visit-time-ampm { font-size: 10px; color: var(--text3); display: block; }
  .visit-info { flex: 1; }
  .visit-name { font-size: 12.5px; font-weight: 500; color: var(--text); }
  .visit-apt { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .visit-status {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .status-confirmed { background: var(--green-dim); color: var(--green); }
  .status-pending { background: var(--amber-dim); color: var(--amber); }
  .status-done { background: rgba(255,255,255,0.05); color: var(--text3); }
  .status-new { background: var(--blue-dim); color: var(--blue); }
  .status-lost { background: var(--red-dim); color: var(--red); }

  /* Pipeline mini */
  .pipeline-mini {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px 20px;
  }
  .pipe-stage {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pipe-label { font-size: 11px; color: var(--text2); width: 110px; flex-shrink: 0; }
  .pipe-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--ink3);
    border-radius: 3px;
    overflow: hidden;
  }
  .pipe-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    transition: width 0.6s ease;
  }
  .pipe-count { font-size: 11px; color: var(--text3); min-width: 20px; text-align: right; }

  /* Actividad reciente */
  .activity-list { display: flex; flex-direction: column; }
  .activity-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .activity-body { flex: 1; }
  .activity-text { font-size: 12px; color: var(--text2); line-height: 1.4; }
  .activity-text strong { color: var(--text); font-weight: 500; }
  .activity-time { font-size: 10px; color: var(--text3); margin-top: 3px; }

  /* ── PROSPECTOS ── */
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .page-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
  }
  .page-heading span { color: var(--gold); font-style: italic; }
  .page-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #a87c40);
    color: var(--ink);
  }
  .btn-gold:hover { filter: brightness(1.1); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  .filter-tabs {
    display: flex;
    gap: 4px;
    background: var(--ink2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 4px;
    margin-bottom: 20px;
    width: fit-content;
  }
  .filter-tab {
    padding: 6px 14px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    user-select: none;
  }
  .filter-tab.active {
    background: var(--gold-dim);
    color: var(--gold2);
  }
  .filter-tab:not(.active):hover { color: var(--text); }

  .prospects-table {
    background: var(--ink2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .table-head {
    display: grid;
    grid-template-columns: 2fr 1.4fr 1fr 1.2fr 1fr 0.8fr;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--ink3);
  }
  .th {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
  }
  .table-row {
    display: grid;
    grid-template-columns: 2fr 1.4fr 1fr 1.2fr 1fr 0.8fr;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    cursor: pointer;
    transition: background 0.12s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: rgba(255,255,255,0.02); }
  .prospect-name-cell { display: flex; align-items: center; gap: 10px; }
  .prospect-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .prospect-fullname { font-size: 13px; font-weight: 500; color: var(--text); }
  .prospect-email { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .td { font-size: 12px; color: var(--text2); }
  .td-budget { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--text); }
  .pipeline-dot {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .pipeline-dot::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ── PROPIEDADES ── */
  .props-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .prop-card {
    background: var(--ink2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .prop-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .prop-img {
    height: 140px;
    position: relative;
    overflow: hidden;
  }
  .prop-img-bg {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .prop-badge {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-disponible { background: var(--green-dim); color: var(--green); border: 1px solid rgba(76,175,125,0.3); }
  .badge-reservado { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(232,168,64,0.3); }
  .badge-vendido { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,92,92,0.3); }
  .prop-info { padding: 14px 16px; }
  .prop-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--text); margin-bottom: 4px; }
  .prop-location { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
  .prop-specs {
    display: flex;
    gap: 14px;
    margin-bottom: 12px;
  }
  .spec { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .prop-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .prop-price { font-family: 'Cormorant Garamond', serif; font-size: 19px; color: var(--gold2); }
  .prop-visits { font-size: 11px; color: var(--text3); }

  /* ── AGENDA ── */
  .calendar-wrap {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
  }
  .cal-grid {
    background: var(--ink2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .cal-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--text);
  }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav-btn {
    width: 28px; height: 28px;
    border-radius: 5px;
    background: var(--ink3);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    font-size: 12px;
    transition: all 0.15s;
  }
  .cal-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
  .cal-days-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--ink3);
  }
  .cal-day-label {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 4px;
  }
  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    padding: 12px 16px;
    background: var(--ink3);
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text2);
    background: var(--ink2);
    padding: 4px;
    gap: 2px;
    transition: all 0.12s;
    position: relative;
  }
  .cal-day:hover { background: var(--surface); color: var(--text); }
  .cal-day.today { color: var(--gold); font-weight: 600; }
  .cal-day.today::after {
    content: '';
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--gold);
  }
  .cal-day.has-event { background: var(--gold-dim); }
  .cal-day.selected { background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold2); }
  .cal-day.other-month { opacity: 0.3; }
  .event-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
  }

  /* Slot list */
  .slots-panel {
    background: var(--ink2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .slot-item {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
  }
  .slot-item:last-child { border-bottom: none; }
  .slot-item:hover { background: rgba(255,255,255,0.02); }
  .slot-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    min-width: 48px;
    line-height: 1.1;
  }
  .slot-body { flex: 1; }
  .slot-client { font-size: 12.5px; font-weight: 500; color: var(--text); }
  .slot-apt { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .slot-agent { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* ── SEGUIMIENTO ── */
  .follow-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 20px;
  }
  .timeline-list { display: flex; flex-direction: column; padding: 16px 20px; }
  .tl-item {
    display: flex;
    gap: 14px;
    padding-bottom: 20px;
    position: relative;
  }
  .tl-item::before {
    content: '';
    position: absolute;
    left: 11px; top: 24px; bottom: 0;
    width: 1px;
    background: var(--border);
  }
  .tl-item:last-child::before { display: none; }
  .tl-dot-wrap {
    width: 24px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .tl-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    z-index: 1;
  }
  .tl-body { flex: 1; }
  .tl-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .tl-desc { font-size: 11.5px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
  .tl-time { font-size: 10px; color: var(--text3); margin-top: 4px; }

  .tasks-list { display: flex; flex-direction: column; gap: 8px; padding: 16px 20px; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px;
    background: var(--ink3);
    border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .task-item:hover { border-color: var(--border2); }
  .task-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 10px;
    transition: all 0.15s;
  }
  .task-check.done { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .task-body { flex: 1; }
  .task-title { font-size: 12.5px; color: var(--text); }
  .task-meta { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .task-priority {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .priority-alta { background: var(--red-dim); color: var(--red); }
  .priority-media { background: var(--amber-dim); color: var(--amber); }
  .priority-baja { background: var(--green-dim); color: var(--green); }


  /* ── ASESORÍA LEGAL ── */
  .legal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .legal-grid-full {
    margin-bottom: 20px;
  }
  .legal-tabs {
    display: flex;
    gap: 4px;
    background: var(--ink2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 4px;
    margin-bottom: 20px;
    width: fit-content;
    flex-wrap: wrap;
  }
  .legal-tab {
    padding: 6px 14px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    user-select: none;
    display: flex;
    align-items: center;

function StatusBadge({ estado }) {
  const map = {
    "Nuevo": "new",
    "Contactado": "pending",
    "Interesado": "pending",
    "Visita agendada": "confirmed",
    "Negociación": "confirmed",
    "Cerrado": "done",
    "Perdido": "lost",
  };
  const labels = {
    new:"Nuevo", pending:"En proceso", confirmed:"Activo", done:"Cerrado", lost:"Perdido"
  };
  const cls = map[estado] || "pending";
  return <span className={`visit-status status-${cls}`}>{estado}</span>;
}

  const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const startOffset = new Date(currentYear, currentMonth, 1).getDay();
  const allDays = [...Array(startOffset).fill(null), ...Array(daysInMonth).fill(0).map((_,i)=>i+1)];

              </button>
            </div>
          </div>
        </div>
      )}

      <div className="calendar-wrap">
        <div className="cal-grid">
          <div className="cal-header">
            <div className="cal-month">{monthNames[currentMonth]} {currentYear}</div>

              <div className="cal-nav-btn" onClick={()=>{

              }}>‹</div>
              <div className="cal-nav-btn" onClick={()=>{
                if(currentMonth===11){setCurrentMonth(0);setCurrentYear(y=>y+1);}
                else setCurrentMonth(m=>m+1);
              }}>›</div>
            </div>

          <div className="cal-days-header">
            {weekDays.map(d => <div className="cal-day-label" key={d}>{d}</div>)}

                onClick={()=>d&&setSelDay(d)}
              >
                {d || ""}
                {d && diasConVisitas.has(d) && <div className="event-dot" />}
              </div>
            ))}
          </div>
        </div>

        <div className="slots-panel">
          <div className="panel-header">
            <div className="panel-title">
              {selDay ? `${selDay} de ${monthNames[currentMonth]}` : "Selecciona un día"}
            </div>
            <span className="panel-action">{visitasDelDia.length} visitas</span>
          </div>
          {loading ? (
            <div style={{padding:"32px 20px",textAlign:"center",color:"var(--text3)"}}>Cargando...</div>
          ) : visitasDelDia.length === 0 ? (
            <div style={{padding:"32px 20px",textAlign:"center",color:"var(--text3)"}}>
              Sin visitas para este día.<br/>
              <span style={{fontSize:11,marginTop:8,display:"block"}}>Clic en "+ Agendar visita" para agregar</span>
            </div>
          ) : visitasDelDia.map((v,i) => (
            <div className="slot-item" key={i}>
              <div className="slot-time">
                {formatHora(v.fecha)}
              </div>
              <div className="slot-body">
                <div className="slot-client">{getNombreProspecto(v.prospecto_id)}</div>
                <div className="slot-apt">{getNombrePropiedad(v.propiedad_id)}</div>
                {v.notas && <div className="slot-agent">📝 {v.notas}</div>}
              </div>
              <span className={`visit-status status-${estadoCls(v.estado)}`}>{v.estado}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Seguimiento() {
  const [prospectos, setProspectos] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [actividades, setActividades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadingAct, setLoadingAct] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ tipo:"Llamada", descripcion:"", fecha: new Date().toISOString().slice(0,16) });

  const tipoIcon = { "Llamada":"📞", "Visita":"🏠", "Email":"📧", "WhatsApp":"💬", "Nota":"📝", "Otro":"⭐" };
  const tipoColor = { "Llamada":"var(--blue)", "Visita":"var(--green)", "Email":"var(--gold)", "WhatsApp":"var(--green)", "Nota":"var(--amber)", "Otro":"var(--text3)" };
  const tipoBg = { "Llamada":"var(--blue-dim)", "Visita":"var(--green-dim)", "Email":"var(--gold-dim)", "WhatsApp":"var(--green-dim)", "Nota":"var(--amber-dim)", "Otro":"var(--ink3)" };

  const selected = prospectos.find(p=>p.id===selectedId);

  useEffect(() => {
    const load = async () => {
      setLoading(true);
      const data = await supa.from("prospectos").select("*");
      const arr = Array.isArray(data) ? data : [];
      setProspectos(arr);
      if (arr.length > 0) setSelectedId(arr[0].id);
      setLoading(false);
    };
    load();
  }, []);

  useEffect(() => {
    if (!selectedId) return;
    const loadAct = async () => {
      setLoadingAct(true);
      const data = await supa.from("actividades").select("*");
      const arr = Array.isArray(data) ? data.filter(a=>a.prospecto_id===selectedId) : [];
      setActividades(arr);
      setLoadingAct(false);
    };
    loadAct();
  }, [selectedId]);

  const saveActividad = async () => {
    if (!form.descripcion.trim() || !selectedId) return;
    setSaving(true);
    await supa.from("actividades").insert({
      prospecto_id: selectedId,
      tipo: form.tipo,
      descripcion: form.descripcion,
      fecha: form.fecha,
      agente: "Paula Rodriguez"
    });
    setForm({ tipo:"Llamada", descripcion:"", fecha: new Date().toISOString().slice(0,16) });
    setShowForm(false);
    setSaving(false);
    // Reload actividades
    const data = await supa.from("actividades").select("*");
    const arr = Array.isArray(data) ? data.filter(a=>a.prospecto_id===selectedId) : [];
    setActividades(arr);
  };

  const formatDate = (d) => {
    if (!d) return "";
    return new Date(d).toLocaleDateString("es-CO", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
  };

  if (loading) return <div style={{padding:40,textAlign:"center",color:"var(--text3)"}}>Cargando prospectos...</div>;

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-heading">Seguimiento y <span>Actividades</span></div>
          <div className="page-sub">{selected ? `${selected.nombre} · ${actividades.length} actividades registradas` : "Selecciona un prospecto"}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <select className="sim-select" style={{width:220}} value={selectedId||""} onChange={e=>setSelectedId(e.target.value)}>
            {prospectos.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
          <button className="btn btn-gold" onClick={()=>setShowForm(!showForm)}>+ Registrar actividad</button>
        </div>
      </div>

      {showForm && (
        <div className="panel" style={{marginBottom:20}}>
          <div className="panel-header">
            <div className="panel-title">Nueva Actividad — {selected?.nombre}</div>
            <span className="panel-action" onClick={()=>setShowForm(false)}>✕ Cerrar</span>
          </div>
          <div style={{padding:"16px 20px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            <div>
              <div className="sim-label">Tipo de actividad</div>
              <select className="sim-select" value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}>
                {["Llamada","Visita","Email","WhatsApp","Nota","Otro"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <div className="sim-label">Fecha y hora</div>
              <input className="sim-input" type="datetime-local" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})} />
            </div>
            <div style={{display:"flex",alignItems:"flex-end"}}>
              <button className="btn btn-gold" style={{width:"100%",justifyContent:"center"}} onClick={saveActividad} disabled={saving}>
                {saving?"Guardando...":"💾 Guardar"}
              </button>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <div className="sim-label">Descripción / Notas *</div>
              <input className="sim-input" placeholder="¿Qué pasó en este contacto?" value={form.descripcion} onChange={e=>setForm({...form,descripcion:e.target.value})} />
            </div>
          </div>
        </div>
      )}

      <div className="follow-grid">
        <div className="panel">
          <div className="panel-header">
            <div className="panel-title">Historial de contacto</div>
            <span className="panel-action">{actividades.length} actividades</span>
          </div>
          <div className="timeline-list">
            {loadingAct ? (
              <div style={{padding:20,textAlign:"center",color:"var(--text3)"}}>Cargando...</div>
            ) : actividades.length === 0 ? (
              <div style={{padding:20,textAlign:"center",color:"var(--text3)"}}>
                Sin actividades aún. ¡Registra el primer contacto! 👆
              </div>
            ) : actividades.map((a,i) => (
              <div className="tl-item" key={i}>
                <div className="tl-dot-wrap">
                  <div className="tl-dot" style={{background:tipoBg[a.tipo]||"var(--ink3)"}}>
                    {tipoIcon[a.tipo]||"⭐"}
                  </div>
                </div>
                <div className="tl-body">
                  <div className="tl-title">{a.tipo}</div>
                  <div className="tl-desc">{a.descripcion}</div>
                  <div className="tl-time">{formatDate(a.fecha)} · {a.agente}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {selected && (
            <div className="panel">
              <div className="panel-header">
                <div className="panel-title">Ficha del prospecto</div>
              </div>
              <div className="panel-body">
                {[
                  ["Nombre", selected.nombre],
                  ["Email", selected.email || "—"],
                  ["Teléfono", selected.telefono || "—"],
                  ["Tipo", selected.tipo || "—"],
                  ["Presupuesto", selected.presupuesto || "—"],
                  ["Fuente", selected.fuente || "—"],
                  ["Estado", selected.estado || "—"],
                  ["Notas", selected.notas || "—"],
                ].map(([k,v],i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--border)",fontSize:12}}>
                    <span style={{color:"var(--text3)"}}>{k}</span>
                    <span style={{color:"var(--text)",fontWeight:500,maxWidth:180,textAlign:"right"}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="panel">
            <div className="panel-header">
              <div className="panel-title">Tipos de actividad</div>
            </div>
            <div className="panel-body">
              {["Llamada","Visita","Email","WhatsApp","Nota"].map(tipo=>{
                const count = actividades.filter(a=>a.tipo===tipo).length;
                return (
                  <div key={tipo} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--border)",fontSize:12}}>
                    <span style={{color:"var(--text3)"}}>{tipoIcon[tipo]} {tipo}</span>
                    <span style={{color:tipoColor[tipo],fontWeight:600}}>{count}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    { label:"Avalúo comercial vigente", checked:false, req:"Recomendado" },

    { label:"Inventario firmado del inmueble", checked:false, req:"Recomendado" },
    { label:"Póliza jurídica de arrendamiento", checked:false, req:"Recomendado" },
  ]);

  const [saneamientos, setSaneamientos] = useState([
    { inmueble:"Torre Ámbar 4B", tipo:"Compraventa", avance:85, pendiente:"Avalúo comercial", estado:"En proceso" },
    { inmueble:"Residencial Bosque 12A", tipo:"Saneamiento de título", avance:40, pendiente:"Regularización de superficie", estado:"Alerta" },

    { inmueble:"Sky Residences 902", tipo:"Hipoteca activa", avance:60, pendiente:"Cancelación de gravamen", estado:"En proceso" },
  ]);

  const documentos = [
    { icon:"📄", bg:"var(--blue-dim)", nombre:"Contrato Promesa de Compraventa", meta:"Torre Ámbar 4B · Carlos Mendoza", estado:"Borrador", estCls:"status-pending" },
    { icon:"📋", bg:"var(--green-dim)", nombre:"Contrato de Arrendamiento", meta:"Urban Loft 203 · Ana Torres", estado:"Firmado", estCls:"status-confirmed" },

    { icon:"🏛️", bg:"var(--amber-dim)", nombre:"Escritura Pública", meta:"Mirador Del Valle 7C", estado:"Completo", estCls:"status-confirmed" },

                  <div className="ai-avatar" style={{background: m.role==="assistant"?"var(--gold-dim)":"var(--blue-dim)"}}>
                    {m.role==="assistant" ? "⚖️" : "👤"}
                  </div>
                  <div className="ai-bubble" style={{whiteSpace:"pre-wrap"}}>{m.text}</div>
                </div>
              ))}
              {loading && (
                <div className="ai-msg assistant">
                  <div className="ai-avatar" style={{background:"var(--gold-dim)"}}>⚖️</div>
                  <div className="ai-bubble">
                    <div className="ai-loading">
                      <div className="ai-dot" /><div className="ai-dot" /><div className="ai-dot" />
                    </div>
                  </div>
                </div>
              )}
            </div>
            <div className="ai-input-row">
              <input
                className="ai-input"
                placeholder="Escribe tu consulta legal..."
                value={inputVal}
                onChange={e=>setInputVal(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&sendMessage()}
              />
              <button className="ai-send" onClick={()=>sendMessage()}>➤</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── CRÉDITOS HIPOTECARIOS ────────────────────────────────
function CreditosHipotecarios() {
  const [tab, setTab] = useState("simulador");
  const [monto, setMonto] = useState("400000000");
  const [enganche, setEnganche] = useState("20");
  const [plazo, setPlazo] = useState("20");

  const montoN = parseFloat(monto.replace(/,/g,"")) || 0;
  const engancheN = parseFloat(enganche) || 0;
  const plazoN = parseInt(plazo) || 20;
  const tasaN = parseFloat(tasa) || 10.5;

  const credito = montoN * (1 - engancheN / 100);
  const tasaMensual = tasaN / 100 / 12;
  const numPagos = plazoN * 12;
  const mensualidad = tasaMensual > 0
    ? credito * (tasaMensual * Math.pow(1 + tasaMensual, numPagos)) / (Math.pow(1 + tasaMensual, numPagos) - 1)
    : credito / numPagos;

// ── MÓDULO DE METAS ──────────────────────────────────────
function Metas() {
  const [prospectos, setProspectos] = useState([]);
  const [propiedades, setPropiedades] = useState([]);
  const [visitas, setVisitas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [metas, setMetas] = useState({
    prospectos: 80,
    visitas: 40,
    negociaciones: 20,
    cierres: 10,
  });
  const [editando, setEditando] = useState(false);
  const [tempMetas, setTempMetas] = useState({...metas});

  useEffect(() => {
    const load = async () => {
      setLoading(true);
      const [p, pr, v] = await Promise.all([
        supa.from("prospectos").select("*"),
        supa.from("propiedades").select("*"),
        supa.from("visitas").select("*"),
      ]);
      setProspectos(Array.isArray(p) ? p : []);
      setPropiedades(Array.isArray(pr) ? pr : []);
      setVisitas(Array.isArray(v) ? v : []);
      setLoading(false);
    };
    load();
  }, []);

  const now = new Date();
  const mesActual = now.toLocaleDateString("es-CO", { month:"long", year:"numeric" });

  // Calcular reales
  const reales = {
    prospectos: prospectos.length,
    visitas: visitas.length,
    negociaciones: prospectos.filter(p=>p.estado==="Negociación").length,
    cierres: propiedades.filter(p=>p.estado==="Vendido").length,
  };

  const pct = (real, meta) => Math.min(Math.round((real/meta)*100), 100);
  const color = (p) => p >= 100 ? "var(--green)" : p >= 60 ? "var(--gold)" : p >= 30 ? "var(--amber)" : "var(--red)";

  const kpis = [
    { label:"Prospectos nuevos", icon:"👥", real:reales.prospectos, meta:metas.prospectos, color:"var(--gold)" },
    { label:"Visitas agendadas", icon:"🏠", real:reales.visitas, meta:metas.visitas, color:"var(--blue)" },
    { label:"En negociación", icon:"🤝", real:reales.negociaciones, meta:metas.negociaciones, color:"var(--amber)" },
    { label:"Cierres del mes", icon:"🏆", real:reales.cierres, meta:metas.cierres, color:"var(--green)" },
  ];

  // Pipeline breakdown
  const pipeline = [
    { label:"Nuevos", count: prospectos.filter(p=>p.estado==="Nuevo").length, color:"var(--blue)" },
    { label:"Contactados", count: prospectos.filter(p=>p.estado==="Contactado").length, color:"var(--gold)" },
    { label:"Interesados", count: prospectos.filter(p=>p.estado==="Interesado").length, color:"var(--amber)" },
    { label:"Visita agendada", count: prospectos.filter(p=>p.estado==="Visita agendada").length, color:"var(--green)" },
    { label:"Negociación", count: prospectos.filter(p=>p.estado==="Negociación").length, color:"var(--green)" },
    { label:"Cerrado", count: prospectos.filter(p=>p.estado==="Cerrado").length, color:"var(--text3)" },
    { label:"Perdido", count: prospectos.filter(p=>p.estado==="Perdido").length, color:"var(--red)" },
  ];

  // Ingreso estimado
  const ingresoEstimado = reales.cierres * 6000000;
  const ingresoMeta = metas.cierres * 6000000;
  const fmt = (n) => "$ " + n.toLocaleString("es-CO");

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-heading">Módulo de <span>Metas</span></div>
          <div className="page-sub" style={{textTransform:"capitalize"}}>{mesActual} · iProperties Latam</div>
        </div>
        <button className="btn btn-gold" onClick={()=>{ setTempMetas({...metas}); setEditando(!editando); }}>
          {editando ? "✕ Cancelar" : "✏️ Editar metas"}
        </button>
      </div>

      {editando && (
        <div className="panel" style={{marginBottom:20}}>
          <div className="panel-header">
            <div className="panel-title">Configurar metas del mes</div>
          </div>
          <div style={{padding:"16px 20px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
            {[
              ["Meta prospectos","prospectos"],
              ["Meta visitas","visitas"],
              ["Meta negociaciones","negociaciones"],
              ["Meta cierres","cierres"],
            ].map(([label,key])=>(
              <div key={key}>
                <div className="sim-label">{label}</div>
                <input className="sim-input" type="number" value={tempMetas[key]}
                  onChange={e=>setTempMetas({...tempMetas,[key]:parseInt(e.target.value)||0})} />
              </div>
            ))}
            <div style={{display:"flex",alignItems:"flex-end",gridColumn:"span 4",justifyContent:"flex-end"}}>
              <button className="btn btn-gold" onClick={()=>{ setMetas({...tempMetas}); setEditando(false); }}>
                💾 Guardar metas
              </button>
            </div>
          </div>
        </div>
      )}

      {loading ? (
        <div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>Cargando datos...</div>
      ) : (
        <>
          {/* KPI Cards con progreso */}
          <div className="kpi-row" style={{marginBottom:20}}>
            {kpis.map((k,i) => {
              const p = pct(k.real, k.meta);
              return (
                <div className="kpi-card" key={i} style={{"--accent-color":k.color}}>
                  <div className="kpi-icon">{k.icon}</div>
                  <div className="kpi-label">{k.label}</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                    <div className="kpi-value" style={{color:color(p)}}>{k.real}</div>
                    <div style={{fontSize:13,color:"var(--text3)"}}>/ {k.meta}</div>
                  </div>
                  <div style={{margin:"8px 0 6px"}}>
                    <div style={{height:4,background:"var(--ink3)",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${p}%`,background:color(p),borderRadius:2,transition:"width 0.6s ease"}} />
                    </div>
                  </div>
                  <div style={{fontSize:11,color:color(p),fontWeight:600}}>{p}% de la meta</div>
                </div>
              );
            })}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>
            {/* Ingreso estimado */}
            <div className="panel">
              <div className="panel-header">
                <div className="panel-title">Ingreso estimado del mes</div>
              </div>
              <div className="panel-body">
                <div style={{textAlign:"center",padding:"16px 0"}}>
                  <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:36,color:"var(--gold2)",fontWeight:300}}>
                    {fmt(ingresoEstimado)}
                  </div>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>ingreso real estimado</div>
                  <div style={{height:4,background:"var(--ink3)",borderRadius:2,overflow:"hidden",margin:"16px 0 8px"}}>
                    <div style={{height:"100%",width:`${pct(ingresoEstimado,ingresoMeta)}%`,background:"linear-gradient(90deg,var(--gold),var(--gold2))",borderRadius:2}} />
                  </div>
                  <div style={{fontSize:11,color:"var(--text3)"}}>Meta: {fmt(ingresoMeta)} · {pct(ingresoEstimado,ingresoMeta)}% alcanzado</div>
                </div>
                <div style={{borderTop:"1px solid var(--border)",paddingTop:12,marginTop:4}}>
                  {[
                    ["Comisión por cierre (3%)", fmt(6000000)],
                    [`${reales.cierres} cierres realizados`, fmt(ingresoEstimado)],
                    [`Meta ${metas.cierres} cierres`, fmt(ingresoMeta)],
                  ].map(([k,v],i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--border)",fontSize:12}}>
                      <span style={{color:"var(--text3)"}}>{k}</span>
                      <span style={{color:"var(--text)",fontWeight:500}}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Pipeline breakdown */}
            <div className="panel">
              <div className="panel-header">
                <div className="panel-title">Estado del pipeline</div>
                <span className="panel-action">{prospectos.length} prospectos</span>
              </div>
              <div className="panel-body">
                {pipeline.map((p,i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                    <div style={{fontSize:11,color:"var(--text3)",width:120,flexShrink:0}}>{p.label}</div>
                    <div style={{flex:1,height:6,background:"var(--ink3)",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${prospectos.length>0?(p.count/prospectos.length)*100:0}%`,background:p.color,borderRadius:3}} />
                    </div>
                    <div style={{fontSize:12,color:p.color,fontWeight:600,minWidth:24,textAlign:"right"}}>{p.count}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Inventario */}
          <div className="panel">
            <div className="panel-header">
              <div className="panel-title">Estado del inventario</div>
              <span className="panel-action">{propiedades.length} propiedades</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:0}}>
              {[
                { label:"Disponibles", val:propiedades.filter(p=>p.estado==="Disponible").length, color:"var(--green)", icon:"✅" },
                { label:"Reservadas", val:propiedades.filter(p=>p.estado==="Reservado").length, color:"var(--amber)", icon:"⏳" },
                { label:"Vendidas", val:propiedades.filter(p=>p.estado==="Vendido").length, color:"var(--red)", icon:"🏆" },
                { label:"Total", val:propiedades.length, color:"var(--gold)", icon:"🏠" },
              ].map((item,i)=>(
                <div key={i} style={{padding:"20px",textAlign:"center",borderRight:i<3?"1px solid var(--border)":"none"}}>
                  <div style={{fontSize:24,marginBottom:6}}>{item.icon}</div>
                  <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:32,color:item.color,fontWeight:300}}>{item.val}</div>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{item.label}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );

function GaleriaModal({ propiedad, onClose }) {
  const [fotos, setFotos] = useState([]);
  const [selectedIdx, setSelectedIdx] = useState(0);
  const [uploading, setUploading] = useState(false);

  const loadFotos = useCallback(async () => {
    const data = await supa.from("fotos_propiedades").select("*");
    const arr = Array.isArray(data) ? data.filter(f=>f.propiedad_id===propiedad.id).sort((a,b)=>a.orden-b.orden) : [];
    setFotos(arr);
  }, [propiedad.id]);

  useEffect(() => { loadFotos(); }, [loadFotos]);

  const handleUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setUploading(true);
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const fileName = `${propiedad.id}_${Date.now()}_${i}.${file.name.split('.').pop()}`;
      const url = await supa.uploadFoto(file, fileName);
      if (url) {
        await supa.from("fotos_propiedades").insert({
          propiedad_id: propiedad.id,
          url,
          orden: fotos.length + i
        });
        // Update main photo if first
        if (fotos.length === 0 && i === 0) {
          await supa.from("propiedades").update({ foto_url: url }, { id: propiedad.id });
        }
      }
    }
    setUploading(false);
    loadFotos();
  };

  const handleDelete = async () => {
    if (!fotos[selectedIdx]) return;
    await supa.from("fotos_propiedades").delete({ id: fotos[selectedIdx].id });
    setSelectedIdx(0);
    loadFotos();
  };

  const selectedFoto = fotos[selectedIdx];

  return (
    <div className="gallery-modal" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="gallery-modal-header">
        <div className="gallery-modal-title">📸 {propiedad.nombre}</div>
        <div className="gallery-close" onClick={onClose}>✕</div>
      </div>

      {selectedFoto ? (
        <img src={selectedFoto.url} alt="" className="gallery-main-img" />
      ) : (
        <div className="gallery-main-placeholder">🏠</div>
      )}

      {fotos.length > 0 && (
        <div className="gallery-thumbs">
          {fotos.map((f,i) => (
            <img key={f.id} src={f.url} alt="" className={`gallery-thumb${i===selectedIdx?" active":""}`}
              onClick={()=>setSelectedIdx(i)} />
          ))}
        </div>
      )}

      <div className="gallery-actions">
        <label className="gallery-upload-btn">
          📷 {uploading ? "Subiendo..." : "Subir fotos"}
          <input type="file" accept="image/*" multiple style={{display:"none"}}
            onChange={handleUpload} disabled={uploading} />
        </label>
        {selectedFoto && (
          <div className="gallery-delete-btn" onClick={handleDelete}>🗑 Eliminar</div>
        )}
        {uploading && <span className="gallery-uploading">Subiendo imágenes...</span>}
        <span style={{fontSize:11,color:"var(--text3)"}}>{fotos.length} foto{fotos.length!==1?"s":""}</span>
      </div>
    </div>
  );
}
